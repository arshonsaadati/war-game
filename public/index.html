<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>War Game - WebGPU Monte Carlo Battle Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff4444, #4444ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #666;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    #status {
      background: #1a1a1a;
      padding: 8px 16px;
      border-radius: 4px;
      font-family: monospace;
      margin-bottom: 16px;
      min-width: 400px;
      text-align: center;
    }
    #canvas {
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    #run-battle {
      background: linear-gradient(135deg, #cc3333, #3333cc);
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 1.1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
      margin-bottom: 20px;
    }
    #run-battle:hover { opacity: 0.9; }
    #run-battle:disabled { opacity: 0.4; cursor: not-allowed; }
    #results {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px;
      min-width: 500px;
    }
    #results h3 {
      text-align: center;
      margin-bottom: 16px;
      color: #888;
    }
    .result-grid {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }
    .army-result {
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      min-width: 150px;
    }
    .army-a { background: rgba(200, 40, 40, 0.15); border: 1px solid rgba(200, 40, 40, 0.3); }
    .army-b { background: rgba(40, 40, 200, 0.15); border: 1px solid rgba(40, 40, 200, 0.3); }
    .army-result h4 { margin-bottom: 8px; }
    .win-prob { font-size: 2rem; font-weight: bold; margin: 8px 0; }
    .army-a .win-prob { color: #ff6666; }
    .army-b .win-prob { color: #6666ff; }
    .vs { font-size: 1.5rem; color: #444; font-weight: bold; }
    .draws, .timing { text-align: center; margin-top: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>WAR GAME</h1>
  <p class="subtitle">WebGPU Monte Carlo Battle Simulator</p>
  <div id="status">Loading...</div>
  <canvas id="canvas" width="600" height="300"></canvas>
  <button id="run-battle">Run Battle</button>
  <div id="results"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
